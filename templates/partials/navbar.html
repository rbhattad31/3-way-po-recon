{# ── AP Operations Topbar ── #}
<nav class="ap-topbar">
  {# Sidebar toggle (visible only in copilot) #}
  <button class="btn btn-sm btn-light me-2 d-none" id="btnToggleMainMenu" title="Main menu">
    <i class="bi bi-list"></i>
  </button>

  {# Brand #}
  <a class="ap-topbar-brand" href="{% url 'procurement:home' %}">
    <span class="ap-topbar-brand-icon" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);"><i class="bi bi-wind"></i></span>
    LMG Procurement
  </a>

  {# Right actions #}
  <div class="ap-topbar-actions">
    {% if pending_review_count %}
    <a href="{% url 'reviews:assignment_list' %}" class="btn btn-sm btn-light position-relative" title="Pending Reviews">
      <i class="bi bi-clipboard-check"></i>
      <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:.6rem">
        {{ pending_review_count }}
      </span>
    </a>
    {% endif %}

    {% if user.is_authenticated %}
    <div class="dropdown">
      <button class="btn btn-sm btn-light dropdown-toggle d-flex align-items-center gap-1" type="button" data-bs-toggle="dropdown">
        <i class="bi bi-person-circle"></i>
        <span class="d-none d-lg-inline">{{ user.get_short_name }}</span>
        <span class="ap-badge ap-badge-muted" style="font-size:.6rem">{{ user.role }}</span>
      </button>
      <ul class="dropdown-menu dropdown-menu-end shadow-sm">
        <li><span class="dropdown-item-text small text-muted">{{ user.email }}</span></li>
        <li><hr class="dropdown-divider"></li>
        <li>
          <form method="post" action="{% url 'accounts:logout' %}">
            {% csrf_token %}
            <button type="submit" class="dropdown-item"><i class="bi bi-box-arrow-right me-2"></i>Logout</button>
          </form>
        </li>
      </ul>
    </div>
    {% endif %}
  </div>
</nav>
