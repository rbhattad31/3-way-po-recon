{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Access Denied - AP Operations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{% static 'css/design-tokens.css' %}" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--ap-bg);
      color: var(--ap-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error-container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    .error-code {
      font-size: 7rem;
      font-weight: 700;
      color: #d97706;
      line-height: 1;
      margin-bottom: 0.5rem;
      letter-spacing: -2px;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--ap-dark);
      margin-bottom: 0.75rem;
    }
    .error-message {
      color: var(--ap-text-secondary);
      font-size: 0.95rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .error-icon {
      font-size: 3rem;
      color: #fcd34d;
      margin-bottom: 1rem;
    }
    .btn-back {
      background: var(--ap-primary);
      color: #fff;
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 500;
      font-size: 0.9rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.15s;
    }
    .btn-back:hover {
      background: var(--ap-primary-hover);
      color: #fff;
    }
    .btn-secondary-link {
      color: var(--ap-text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-left: 1rem;
    }
    .btn-secondary-link:hover {
      color: var(--ap-primary);
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon"><i class="bi bi-shield-lock"></i></div>
    <div class="error-code">403</div>
    <div class="error-title">Access denied</div>
    <p class="error-message">
      You do not have permission to access this page.
      Contact your administrator if you believe this is an error.
    </p>
    <div>
      <a href="/" class="btn-back"><i class="bi bi-arrow-left"></i> Go to Dashboard</a>
      <a href="javascript:history.back()" class="btn-secondary-link"><i class="bi bi-arrow-counterclockwise"></i> Go back</a>
    </div>
  </div>
</body>
</html>
