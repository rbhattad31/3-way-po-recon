{# Timeline tab -- loaded via AJAX from case timeline API #}

<div class="tab-panel-inner">
  <div class="case-card">
    <div class="case-card-header d-flex justify-content-between align-items-center">
      <span><i class="bi bi-clock-history text-primary me-2"></i>Case Timeline</span>
      <button class="btn btn-sm btn-outline-secondary" onclick="loadTimeline()" title="Refresh">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
    <div class="case-card-body" id="timelineContent">
      <div class="text-center py-4">
        <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
        <p class="text-muted small mt-2">Loading timeline...</p>
      </div>
    </div>
  </div>
</div>
