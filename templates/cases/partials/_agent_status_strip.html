{# ── Agent Status Strip ── #}
{# Context: agent_runs (list of AgentRun) #}

<div class="ap-card mb-3">
  <div class="ap-card-header"><i class="bi bi-cpu"></i> Agent Activity</div>
  {% if agent_runs %}
  <div class="ap-agent-strip">
    {% for run in agent_runs %}
    <div class="ap-agent-chip {% if run.status == 'COMPLETED' %}completed{% elif run.status == 'RUNNING' %}running{% elif run.status == 'FAILED' %}failed{% elif run.status == 'SKIPPED' %}skipped{% else %}pending{% endif %}"
         data-bs-toggle="tooltip"
         title="{{ run.agent_definition.name|default:run.agent_type }} — {{ run.get_status_display }}{% if run.confidence %} ({{ run.confidence|floatformat:0 }}%){% endif %}">
      <span class="ap-dot"></span>
      <span>{{ run.agent_definition.name|default:run.agent_type }}</span>
      {% if run.confidence %}
      <span class="ap-confidence">
        <div class="ap-confidence-bar">
          <div class="ap-confidence-fill {% if run.confidence >= 80 %}high{% elif run.confidence >= 50 %}medium{% else %}low{% endif %}"
               style="width:{{ run.confidence|floatformat:0 }}%"></div>
        </div>
      </span>
      {% endif %}
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="ap-empty-state">
    <i class="bi bi-cpu"></i>
    <div class="ap-empty-state-label">No agents have run yet</div>
  </div>
  {% endif %}
</div>
