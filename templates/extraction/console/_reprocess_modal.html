{# extraction/console/_reprocess_modal.html — Reprocess extraction modal #}

<div class="modal fade" id="reprocessModal" tabindex="-1" aria-labelledby="reprocessModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title" id="reprocessModalLabel">
          <i class="bi bi-arrow-repeat text-primary me-2"></i>Reprocess Extraction
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="alert alert-info py-2 small">
          <i class="bi bi-info-circle me-1"></i>
          This will re-run the extraction pipeline for this document. The current extracted data will be
          archived and replaced with new results.
        </div>

        <form id="reprocessForm">
          {% csrf_token %}
          <input type="hidden" name="extraction_id" value="{{ extraction.id }}">

          <div class="mb-3">
            <label class="form-label small fw-semibold">Reason for Reprocessing</label>
            <select class="form-select form-select-sm" name="reason" required>
              <option value="">Select a reason...</option>
              <option value="low_confidence">Low confidence scores</option>
              <option value="missing_fields">Missing critical fields</option>
              <option value="incorrect_data">Incorrect extracted data</option>
              <option value="wrong_jurisdiction">Wrong jurisdiction detected</option>
              <option value="ocr_issues">OCR quality issues</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label small fw-semibold">Additional Details (optional)</label>
            <textarea class="form-control form-control-sm" name="details" rows="2"
                      placeholder="Provide additional context..."></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label small fw-semibold">Override Options</label>
            <div class="form-check mb-1">
              <input class="form-check-input" type="checkbox" name="force_llm" id="forceLlmCheck">
              <label class="form-check-label small" for="forceLlmCheck">
                Force LLM extraction (bypass deterministic)
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="override_jurisdiction" id="overrideJurisdictionCheck">
              <label class="form-check-label small" for="overrideJurisdictionCheck">
                Override jurisdiction detection
              </label>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm btn-primary" id="confirmReprocessBtn">
          <i class="bi bi-arrow-repeat me-1"></i>Reprocess
        </button>
      </div>
    </div>
  </div>
</div>
