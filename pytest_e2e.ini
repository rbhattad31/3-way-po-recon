[pytest]
# E2E tests configuration
# Run: python -m pytest e2e_tests/ -v

# Use project test settings
DJANGO_SETTINGS_MODULE = config.settings

# Default test paths
testpaths = e2e_tests

# Markers
markers =
    smoke: critical path tests (subset)
    slow: integration tests touching Celery / LLM
    ui: tests that make HTTP requests via Django test client

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header

# Ignore migrations and static
norecursedirs =
    .git
    .venv
    __pycache__
    migrations
    staticfiles
    media
    node_modules
    .tox
