version: "3.8"

# Local observability stack -- Grafana + Loki + Promtail
# Usage:  docker compose -f docker-compose.loki.yml up -d
# Grafana: http://localhost:3000  (login: admin / admin)
# Loki API: http://localhost:3100

volumes:
  loki_data: {}
  grafana_data: {}

networks:
  observability:
    driver: bridge

services:

  loki:
    image: grafana/loki:2.9.4
    container_name: po_recon_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
      - ./deploy/loki-config.yaml:/etc/loki/local-config.yaml:ro
    networks:
      - observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.2
    container_name: po_recon_grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana-provisioning:/etc/grafana/provisioning:ro
    networks:
      - observability
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.4
    container_name: po_recon_promtail
    volumes:
      - ./logs:/var/log/po-recon:ro
      - ./deploy/promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - observability
    depends_on:
      - loki
    restart: unless-stopped
