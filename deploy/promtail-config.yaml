server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: po_recon_file
    static_configs:
      - targets:
          - localhost
        labels:
          service: po-recon
          env: dev
          __path__: /var/log/po-recon/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            trace_id: trace_id
            agent_type: agent_type
            invoice_id: invoice_id
      - labels:
          level:
          trace_id:
          agent_type:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
