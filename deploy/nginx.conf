# =============================================================================
# Finance Agents Platform — Nginx Configuration
# =============================================================================
# Install:
#   sudo cp /opt/finance-agents/deploy/nginx.conf /etc/nginx/sites-available/finance-agents
#   sudo ln -sf /etc/nginx/sites-available/finance-agents /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

upstream finance_agents_app {
    server unix:/opt/finance-agents/run/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    server_name _;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ------------------------------------------------------------------
    # Upload size (for invoice documents / PDFs)
    # ------------------------------------------------------------------
    client_max_body_size 50M;

    # ------------------------------------------------------------------
    # Logging
    # ------------------------------------------------------------------
    access_log /opt/finance-agents/logs/nginx-access.log;
    error_log  /opt/finance-agents/logs/nginx-error.log;

    # ------------------------------------------------------------------
    # Static files
    # ------------------------------------------------------------------
    location /static/ {
        alias /opt/finance-agents/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ------------------------------------------------------------------
    # Media files (uploaded invoices, reports)
    # ------------------------------------------------------------------
    location /media/ {
        alias /opt/finance-agents/media/;
        expires 7d;
        add_header Cache-Control "public";
        # Prevent execution of uploaded files
        location ~* \.(php|py|sh|pl|cgi)$ {
            deny all;
        }
    }

    # ------------------------------------------------------------------
    # Health check (bypass proxy for load-balancer probes)
    # ------------------------------------------------------------------
    location /health/ {
        proxy_pass http://finance_agents_app;
        proxy_set_header Host $host;
        access_log off;
    }

    # ------------------------------------------------------------------
    # Application (reverse proxy to Gunicorn)
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://finance_agents_app;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — agent/LLM calls can be slow
        proxy_connect_timeout 120s;
        proxy_read_timeout    300s;
        proxy_send_timeout    120s;

        # WebSocket support (for future copilot streaming)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ------------------------------------------------------------------
    # Deny access to hidden files
    # ------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
